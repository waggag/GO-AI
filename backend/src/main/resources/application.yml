server:
  port: 8080

spring:
  application:
    name: go-ai-backend
  r2dbc:
    url: r2dbc:mysql://localhost:3306/go_ai?useUnicode=true&characterEncoding=utf8mb4
    username: goai
    password: goai123
  data:
    redis:
      host: localhost
      port: 6379
  sql:
    init:
      mode: always
  ai:
    openai:
      api-key: ${OPENAI_API_KEY:}
      chat:
        options:
          model: gpt-4o-mini

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  tracing:
    sampling:
      probability: 1.0

jwt:
  secret: ${JWT_SECRET:0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
  expiration-minutes: 120

rate-limit:
  capacity: 100
  refill-tokens: 100
  refill-duration-seconds: 1
  stream-capacity: 20
  stream-refill-tokens: 20
  stream-refill-duration-seconds: 1

app:
  api-key-encryption-secret: ${API_KEY_ENCRYPTION_SECRET:go-ai-default-secret-change-me}
  sensitive-words:
    - 赌博
    - 暴恐
    - 违禁品
